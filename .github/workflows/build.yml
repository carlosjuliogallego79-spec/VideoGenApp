name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Show versions
        run: |
          flutter --version
          java -version 2>&1 || true

      - name: Generate Android platform
        run: |
          cd /tmp
          flutter create --project-name videogenapp --platforms android temp_app
          cp -r temp_app/android $GITHUB_WORKSPACE/android
          rm -rf temp_app

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --verbose 2>&1 | tee /tmp/build_log.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build_log.txt

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VideoGenApp-APK
          path: build/app/outputs/flutter-apk/*.apk
