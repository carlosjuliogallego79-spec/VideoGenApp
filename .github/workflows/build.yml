name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install apt deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev python3-virtualenv
          sudo apt install -y libffi-dev libssl-dev libjpeg-dev zlib1g-dev
          sudo apt install -y liblzma-dev libtool autoconf-archive automake pkg-config
          sudo apt install -y ccache libncurses5-dev libncursesw5-dev

      - name: Install buildozer
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user buildozer cython

      - name: Build APK
        id: build
        continue-on-error: true
        run: |
          export PATH=$HOME/.local/bin:$PATH
          python3 -m buildozer android debug 2>&1 | tee build_output.txt || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          if-no-files-found: warn

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VideoGenApp-APK
          path: bin/*.apk
