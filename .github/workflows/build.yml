name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-dev libffi-dev libssl-dev
          sudo apt install -y libjpeg-dev zlib1g-dev liblzma-dev
          sudo apt install -y libtool autoconf-archive automake pkg-config
          pip install buildozer

      - name: Build with buildozer
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoGenApp-APK
          path: bin/*.apk
