name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Show versions
        run: |
          flutter --version
          java -version 2>&1 || true

      - name: Generate Android platform
        run: |
          cd /tmp
          flutter create --project-name videogenapp --platforms android temp_app
          cp -r temp_app/android $GITHUB_WORKSPACE/android
          rm -rf temp_app

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyze
        run: |
          flutter analyze 2>&1 | tee /tmp/analyze_log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::group::Dart analyze errors"
            grep -i "error" /tmp/analyze_log.txt
            echo "::endgroup::"
            exit 1
          fi

      - name: Build APK
        run: |
          set -o pipefail
          flutter build apk --release --verbose 2>&1 | tee /tmp/build_log.txt

      - name: Show errors from analyze/build log
        if: failure()
        run: |
          if [ -f /tmp/analyze_log.txt ]; then
            echo "=== Dart analyze errors ==="
            grep -n "error" /tmp/analyze_log.txt || echo "No 'error' lines in analyze log"
            echo "=== Dart analyze warnings ==="
            grep -n "warning" /tmp/analyze_log.txt || echo "No 'warning' lines in analyze log"
          fi
          if [ -f /tmp/build_log.txt ]; then
            echo "=== Tail of build log ==="
            tail -50 /tmp/build_log.txt
            echo "=== Build errors ==="
            grep -n "error" /tmp/build_log.txt || echo "No 'error' lines in build log"
            echo "=== FAILED lines ==="
            grep -n "FAILED" /tmp/build_log.txt || echo "No FAILED lines"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/analyze_log.txt
            /tmp/build_log.txt

      - name: List build outputs
        if: always()
        run: |
          echo "=== Build outputs ==="
          find build -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"
          echo "=== Android dir ==="
          ls -la android/ 2>/dev/null || echo "No android dir"
          echo "=== Project root ==="
          ls -la

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VideoGenApp-APK
          path: build/app/outputs/flutter-apk/*.apk
