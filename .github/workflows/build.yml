name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Debug system info
        run: |
          echo "=== Python ==="
          which python3
          python3 --version
          python3 -m pip --version 2>&1 || echo "pip not available"
          echo "=== Python3.11 ==="
          which python3.11 2>&1 || echo "no python3.11"
          echo "=== Python3.12 ==="
          which python3.12 2>&1 || echo "no python3.12"
          echo "=== pip versions ==="
          which pip 2>&1 || echo "no pip"
          which pip3 2>&1 || echo "no pip3"
          echo "=== uname ==="
          uname -m
          echo "=== libtool ==="
          libtool --version 2>&1 || echo "no libtool"
          echo "=== lsb_release ==="
          lsb_release -a 2>&1 || echo "no lsb_release"
          echo "=== env ==="
          env | sort

      - name: Install apt deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev python3-virtualenv
          sudo apt install -y libffi-dev libssl-dev libjpeg-dev zlib1g-dev
          sudo apt install -y liblzma-dev libtool autoconf-archive automake pkg-config
          sudo apt install -y ccache libncurses5-dev libncursesw5-dev

      - name: Install buildozer (system pip)
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user buildozer cython

      - name: Verify buildozer
        run: |
          export PATH=$HOME/.local/bin:$PATH
          which buildozer
          buildozer --version

      - name: Build APK
        run: |
          export PATH=$HOME/.local/bin:$PATH
          python3 -m buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoGenApp-APK
          path: bin/*.apk
